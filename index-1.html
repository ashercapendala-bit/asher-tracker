<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Asher — 8 Week Program</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#0a0a0a;color:#f0f0f0;font-family:'DM Sans',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;overflow-x:hidden}
  ::-webkit-scrollbar{display:none}
  input,textarea,select{outline:none;-webkit-appearance:none}
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  button{cursor:pointer;font-family:'DM Sans',sans-serif}

  /* Nav */
  .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0f0f0f;border-top:1px solid #1e1e1e;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;background:none;border:none;color:#444;font-size:10px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;transition:color 0.15s;gap:4px}
  .nav-btn.active{color:#e8531a}
  .nav-icon{font-size:18px;line-height:1}

  /* Cards */
  .card{background:#161616;border:1px solid #222;border-radius:12px;padding:14px;margin-bottom:10px}
  .card-accent{border-left:3px solid var(--accent,#e8531a)}
  .section-label{font-family:'DM Mono',monospace;font-size:9px;color:#444;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;margin-top:4px}

  /* Inputs */
  .input{width:100%;background:#111;border:1px solid #222;border-radius:8px;color:#f0f0f0;font-size:16px;padding:10px 12px;font-family:'DM Sans',sans-serif;transition:border-color 0.2s}
  .input:focus{border-color:#e8531a55}
  .input-label{font-family:'DM Mono',monospace;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
  .field{margin-bottom:12px}

  /* Buttons */
  .btn-primary{background:#e8531a;border:none;color:#fff;border-radius:8px;padding:12px;font-size:14px;font-weight:700;width:100%;transition:opacity 0.15s}
  .btn-primary:active{opacity:0.8}
  .btn-ghost{background:#111;border:1px solid #222;color:#888;border-radius:8px;padding:12px;font-size:13px;font-weight:600;flex:1;transition:background 0.15s}
  .btn-ghost:active{background:#1a1a1a}

  /* Tags */
  .tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px}

  /* Progress bar */
  .progress-track{height:5px;background:#1a1a1a;border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;border-radius:99px;transition:width 0.6s ease}

  /* Chart */
  .chart-wrap{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:14px 4px 8px;width:100%;display:block}
  .stat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:14px}
  .stat-card{background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:10px;text-align:center}
  .stat-value{font-size:15px;font-weight:700}
  .stat-label{font-size:9px;color:#444;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;margin-top:3px}
  .tracker-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .tracker-card{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:12px}
  .tracker-value{font-size:24px;font-weight:800;line-height:1}
  .tracker-sub{font-size:11px;color:#666;margin-top:6px;line-height:1.4}
  .meal-card{background:#161616;border:1px solid #222;border-radius:10px;padding:12px;margin-bottom:10px}
  .list-row{display:flex;gap:8px;align-items:flex-start}
  .tiny-btn{background:#111;border:1px solid #222;color:#888;border-radius:8px;padding:10px 12px;font-size:12px;font-weight:700}
  .shopping-item{display:flex;gap:10px;align-items:flex-start;background:#161616;border:1px solid #222;border-radius:10px;padding:12px;margin-bottom:8px}
  .shopping-check{width:18px;height:18px;border-radius:5px;border:1px solid #333;background:#111;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
  .shopping-item.done{opacity:0.7}
  .shopping-item.done .shopping-check{background:#1ab873;border-color:#1ab873;color:#fff}
  .shopping-item.done .shopping-text{text-decoration:line-through;color:#666}

  /* Exercise card */
  .ex-card{background:#161616;border:1px solid #222;border-radius:10px;margin-bottom:8px;overflow:hidden}
  .ex-header{padding:12px 14px 8px;border-left:3px solid var(--accent,#e8531a)}
  .ex-name{font-size:14px;font-weight:700;color:#f0f0f0;margin-bottom:2px}
  .ex-sets{font-size:13px;font-weight:700;color:var(--accent,#e8531a);margin-bottom:6px}
  .ex-rest{font-size:11px;color:#555;margin-bottom:4px}
  .ex-note{font-size:12px;color:#999;line-height:1.5;margin-bottom:4px}
  .ex-prog{font-size:11px;color:#cc6633;line-height:1.4}

  /* Change badge */
  .change-badge{display:flex;gap:8px;align-items:flex-start;background:#0f1a0f;border:1px solid #1a3a1a;border-radius:8px;padding:10px 12px;margin-bottom:6px}
  .change-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}

  /* Day tab */
  .day-pill{background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0;transition:all 0.15s;color:#555}
  .day-pill.active{background:#e8531a;border-color:#e8531a;color:#fff}
  .day-pill.has-data{color:#f0f0f0;border-color:#2a2a2a}

  /* Week selector */
  .week-pill{background:#111;border:1px solid #1a1a1a;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:700;color:#444;flex-shrink:0;transition:all 0.15s}
  .week-pill.active{background:#e8531a;border-color:#e8531a;color:#fff}
  .week-pill.done{color:#f0f0f0;border-color:#2a2a2a}

  /* Macro bar */
  .macro-row{display:flex;gap:8px;margin-bottom:10px}
  .macro-chip{flex:1;background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:8px;text-align:center}
  .macro-val{font-size:17px;font-weight:800}
  .macro-lbl{font-size:9px;color:#555;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}

  /* Scroll row */
  .scroll-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}

  @media (max-width: 360px){
    .nav-btn{font-size:9px}
    .nav-icon{font-size:16px}
    .stat-grid,.tracker-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ── Storage ───────────────────────────────────────────────────────────────
const store = {
  get: k => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

// ── Data defaults ─────────────────────────────────────────────────────────
const START_WEIGHT = 82.2, TARGET = 76.0, DEFAULT_WATER_GOAL = 8;
const WEEKS = Array.from({length:8},(_,i)=>{
  const d = new Date("2026-04-15");
  d.setDate(d.getDate()+i*7);
  return {week:i+1, date:d.toLocaleDateString("en-AU",{day:"numeric",month:"short"}),
    target: parseFloat((START_WEIGHT-(START_WEIGHT-TARGET)*((i+1)/8)).toFixed(1))};
});

const defaultEntry = () => ({weight:"",chinups:"",pushups:"",
  runKm:"",runMin:"",runEffort:"",shinPain:"no",notes:""});

function loadEntries(){
  const saved = store.get("entries_v2");
  if(saved) return saved;
  const e={};
  WEEKS.forEach(w=>{ e[w.week]=defaultEntry(); });
  e[1].weight="82.2";
  return e;
}

function getTodayKey(){
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth()+1).padStart(2,"0");
  const day = String(now.getDate()).padStart(2,"0");
  return `${year}-${month}-${day}`;
}

function defaultNutritionEntry(){
  return {
    calories:"",
    protein:"",
    carbs:"",
    fat:"",
    waterCups:0,
    waterMl:"",
    breakfast:"",
    lunch:"",
    dinner:"",
    snacks:"",
    notes:"",
  };
}

function loadNutrition(){
  return store.get("nutrition_v1") || {};
}

function defaultShoppingItems(){
  return [
    {id:"shop-1", text:"Chicken thigh", done:false},
    {id:"shop-2", text:"Rice", done:false},
    {id:"shop-3", text:"Frozen vegetables", done:false},
    {id:"shop-4", text:"Greek yoghurt", done:false},
    {id:"shop-5", text:"Oats", done:false},
    {id:"shop-6", text:"Bananas", done:false},
  ];
}

function loadShopping(){
  const saved = store.get("shopping_v1");
  return Array.isArray(saved) && saved.length ? saved : defaultShoppingItems();
}

// ── Adaptive plan engine ──────────────────────────────────────────────────
function getAdaptedPlan(week, entries){
  const prev = week>1 ? entries[week-1] : null;
  const prev2 = week>2 ? entries[week-2] : null;
  const changes = [];

  // Pull from logs
  const chinups = prev?.chinups ? parseInt(prev.chinups)||4 : 4;
  const pushups = prev?.pushups ? parseInt(prev.pushups)||15 : 15;
  const runEffort = prev?.runEffort ? parseInt(prev.runEffort)||5 : 5;
  const runKm = prev?.runKm ? parseFloat(prev.runKm)||0 : 0;
  const shinPain = prev?.shinPain === "yes";
  const weightStalled = prev?.weight && prev2?.weight &&
    Math.abs(parseFloat(prev.weight)-parseFloat(prev2.weight)) < 0.2;

  // ── PUSH progressions
  const pushExs = [];

  // Incline push-up
  const inclineWeeks = week <= 2;
  if(inclineWeeks){
    pushExs.push({name:"Incline Push-Up",sets:"3",reps:"12–15",rest:"60s",
      note:"Hands on bench or step. Full chest down, elbows 45°. Builds the pattern before going flat.",
      prog:"Drop incline angle each week."});
  }

  // Flat push-up
  let flatSets = 3;
  if(pushups >= 20){ flatSets = 4; changes.push({field:"Flat Push-Up",change:"Added a 4th set",reason:`You hit ${pushups} reps last week — volume increased to match.`,color:"#1ab873"}); }
  pushExs.push({name:"Flat Push-Up",sets:`${flatSets}`,reps:"AMRAP −2",rest:"90s",
    note:"Stop 2 reps short of failure. Lock out at top, chest touches floor at bottom.",
    prog:`Target: 20+ reps to unlock diamond push-up progression. You're at ${pushups}.`});

  // Diamond
  let diamondSets="2", diamondReps="6–8";
  if(pushups>=20){ diamondSets="3"; diamondReps="8–10";
    if(week>=3) changes.push({field:"Diamond Push-Up",change:"3 sets × 8–10",reason:"Flat push-up strength supports higher diamond volume.",color:"#1ab873"}); }
  pushExs.push({name:"Diamond Push-Up",sets:diamondSets,reps:diamondReps,rest:"90s",
    note:"Hands form a diamond under chest. Heaviest tricep load in the session.",
    prog:"Build to 3×12 by week 8."});

  // Pike
  let pikeNote="Hips high, forehead toward floor. Shoulder strength foundation.";
  let pikeSets="3", pikeProg="Elevate feet on bench from week 5.";
  if(week>=5){ pikeSets="4"; pikeNote="Feet elevated on bench. Full shoulder press range of motion.";
    pikeProg="Elevate feet higher as strength improves.";
    if(week===5) changes.push({field:"Pike Push-Up",change:"Feet on bench + 4th set",reason:"Week 5 progression — heavier shoulder load.",color:"#e8531a"}); }
  pushExs.push({name:"Pike Push-Up",sets:pikeSets,reps:"8–10",rest:"90s",note:pikeNote,prog:pikeProg});

  // Dips
  let dipNote="Elbows track back, straight spine throughout.";
  let dipProg="Add 2-second pause at bottom from week 4.";
  if(week>=4){ dipNote="Elbows back. 2-second pause at bottom every rep."; dipProg="Build to 3×15."; }
  pushExs.push({name:"Tricep Dips (Chair)",sets:"3",reps:"10–12",rest:"60s",note:dipNote,prog:dipProg});

  // ── PULL progressions
  const pullExs = [];

  // Dead hang
  let hangTime = week<=3?"20–30s":week<=5?"30–40s":"40–45s";
  if(week===4) changes.push({field:"Dead Hang",change:"Increase hold to 30–40s",reason:"Week 4 progression — building grip endurance.",color:"#1ab873"});
  if(week===6) changes.push({field:"Dead Hang",change:"Target 45s hold",reason:"Week 6 — approaching full hang capacity.",color:"#1ab873"});
  pullExs.push({name:"Dead Hang",sets:"3",reps:hangTime,rest:"60s",
    note:"Depress shoulder blades slightly — don't just dangle. Active hang.",
    prog:`Building toward 45s holds. Current target: ${hangTime}.`});

  // Scapular pull-up
  let scapProg="Add 2s hold at top from week 3.";
  let scapNote="From dead hang, depress and retract shoulder blades without bending elbows.";
  if(week>=3){ scapProg="Hold 2s at top of each rep."; scapNote="From dead hang, depress and retract. Hold 2 seconds at top."; }
  pullExs.push({name:"Scapular Pull-Up",sets:"3",reps:"8–10",rest:"60s",note:scapNote,prog:scapProg});

  // Negatives
  let negTime="5–8s", negSets="3";
  if(week>=5){ negTime="8–10s"; negSets=chinups>=6?"4":"3";
    if(week===5) changes.push({field:"Negative Pull-Up",change:"Slow to 8–10s lowering",reason:"Week 5 — increasing time under tension.",color:"#e8531a"}); }
  if(chinups>=6 && week>=5){ changes.push({field:"Negative Pull-Up",change:"Added 4th set",reason:`${chinups} chin-ups logged — pulling strength ready for more volume.`,color:"#1ab873"}); }
  pullExs.push({name:"Negative Pull-Up",sets:negSets,reps:"4–5",rest:"2 min",
    note:`Lower as slowly as possible — target ${negTime} down. Jump to get chin over bar.`,
    prog:`Current target: ${negTime}. This is the primary pull-up builder.`});

  // Chin-up
  let chinSets="3", chinNote=`You logged ${chinups} last week. Aim for ${chinups} clean reps per set.`;
  if(chinups>=6 && week>=4){ chinSets="4";
    changes.push({field:"Chin-Up",change:"4th set added",reason:`${chinups} reps logged — capacity supports extra volume.`,color:"#1ab873"}); }
  pullExs.push({name:"Chin-Up (Underhand)",sets:chinSets,reps:"Max quality",rest:"2 min",
    note:chinNote+" Full ROM: dead hang to chin clearly over bar. No kipping.",
    prog:`Week 4 target: 6 reps. Week 8 target: 8 reps. You're at ${chinups}.`});

  // Inverted row
  let rowAngle="45°", rowNote="Body rigid, pull chest to bar. Squeeze shoulder blades at top.";
  if(week>=6){ rowAngle="more horizontal"; rowNote="Body more horizontal — greater difficulty. Pause 3s at top.";
    if(week===6) changes.push({field:"Inverted Row",change:"Lower body angle + 3s pause",reason:"Week 6 progression — horizontal rows are significantly harder.",color:"#e8531a"}); }
  pullExs.push({name:"Inverted Row",sets:"3",reps:"10–12",rest:"90s",note:rowNote,
    prog:`Angle: ${rowAngle}. Lower further as strength improves.`});

  // Pull-apart
  pullExs.push({name:"Towel Pull-Apart",sets:"3",reps:"15",rest:"45s",
    note:"Hold towel at eye level, pull apart to full extension. Rear delt and shoulder health.",
    prog:"Slow to 3s each direction when it feels easy."});

  // ── CORE progressions
  const coreExs = [];
  let bugNote="Opposite arm and leg lower slowly. Lower back stays glued to floor.";
  let bugProg="Add 3s pause at full extension.";
  if(week>=3){ bugNote="Opposite arm and leg, 3-second pause at full extension. Lower back glued down."; bugProg="Build to 5s pause."; }
  coreExs.push({name:"Dead Bug",sets:"3",reps:"8/side",rest:"45s",note:bugNote,prog:bugProg});

  let hollowTime=week<=2?"20–25s":week<=4?"25–35s":"35–45s";
  coreExs.push({name:"Hollow Body Hold",sets:"3",reps:hollowTime,rest:"30s",
    note:"Arms overhead, lower back into floor, legs raised. Bend knees if back lifts.",
    prog:`Target time: ${hollowTime}. Build to 45s by week 8.`});

  let plankNote="Elbows under shoulders. Squeeze glutes and quads.";
  let plankProg="Progress to shoulder taps from week 4.";
  if(week>=4){ plankNote="Plank shoulder taps: tap each shoulder alternately, keep hips still."; plankProg="Add more taps per set each week."; }
  coreExs.push({name:week>=4?"Plank Shoulder Taps":"Plank",sets:"2",reps:week>=4?"10 taps/side":"30–45s",rest:"30s",note:plankNote,prog:plankProg});

  // ── RUN plan
  let runPlan = {};
  let baseWeek = week;

  if(shinPain){
    runPlan = {
      wed:{type:"Run/Walk",desc:"3 min run / 1 min walk × 6. Shin pain flagged — holding run/walk.",duration:"24 min"},
      sat:{type:"Run/Walk",desc:"3 min run / 1 min walk × 5.",duration:"20 min"}
    };
    changes.push({field:"Running",change:"Held at Run/Walk — shin pain",reason:"You flagged shin pain last week. Drop to run/walk and allow recovery. Never push through shin pain.",color:"#e85555"});
  } else if(runEffort>=8){
    baseWeek = Math.max(1, week-1);
    changes.push({field:"Running",change:"Holding previous week's level",reason:`Effort was ${runEffort}/10 last run — too hard to progress safely. Consolidating fitness first.`,color:"#d4a017"});
  } else if(runEffort<=4 && week<=7){
    baseWeek = Math.min(8, week+1);
    changes.push({field:"Running",change:"Progressed one level early",reason:`Effort was only ${runEffort}/10 — you're ahead of the curve. Moving to next level.`,color:"#1ab873"});
  }

  const runPlans = {
    1:{wed:{type:"Run/Walk",desc:"3 min run / 1 min walk. Repeat for full duration. Focus on shin comfort.",duration:"25 min"},sat:{type:"Run/Walk",desc:"3 min run / 1 min walk. Same as Wednesday.",duration:"25 min"}},
    2:{wed:{type:"Run/Walk",desc:"3 min run / 1 min walk. Try to keep form consistent on run sections.",duration:"25 min"},sat:{type:"Run/Walk",desc:"3 min run / 1 min walk. Note how shins feel.",duration:"25 min"}},
    3:{wed:{type:"Easy Run",desc:"Continuous easy pace. Conversational — you can speak full sentences. If you can't, slow down.",duration:"28 min"},sat:{type:"Easy Run",desc:"Continuous easy pace.",duration:"25 min"}},
    4:{wed:{type:"Easy Run",desc:"Continuous easy pace. Focus on breathing rhythm.",duration:"28 min"},sat:{type:"Easy Run",desc:"Continuous easy pace.",duration:"25 min"}},
    5:{wed:{type:"Easy Run",desc:"Continuous easy pace. This should be starting to feel more comfortable.",duration:"30 min"},sat:{type:"Intervals",desc:"6 × 90s hard effort (7–8/10) with 90s walk recovery between each. Warm up 3 min walk first.",duration:"~24 min"}},
    6:{wed:{type:"Easy Run",desc:"Continuous easy pace.",duration:"30 min"},sat:{type:"Intervals",desc:"6 × 90s hard effort (7–8/10) with 90s walk recovery.",duration:"~24 min"}},
    7:{wed:{type:"Easy Run",desc:"Build to 35 min. Steady comfortable pace.",duration:"35 min"},sat:{type:"Intervals",desc:"8 × 90s hard effort (7–8/10) with 90s walk recovery.",duration:"~28 min"}},
    8:{wed:{type:"Easy Run",desc:"Final easy run — reflect on how far your fitness has come from week 1.",duration:"35 min"},sat:{type:"Intervals",desc:"8 × 90s hard effort (7–8/10) with 90s walk recovery.",duration:"~28 min"}},
  };

  if(!runPlan.wed) runPlan = runPlans[Math.min(8,Math.max(1,baseWeek))];

  // ── DIET adjustments
  let calories = 1800, carbsNote = "Standard training day macros.";
  let dietChanges = [];
  if(weightStalled){
    calories = 1700;
    carbsNote="Reduce carbs by 35g — cut rice portion to 100g cooked. Keep protein at 145g.";
    dietChanges.push({field:"Calories",change:"Reduced to 1700 kcal",reason:"Weight hasn't moved in 2 weeks. Dropping carbs by 35g to restart the deficit. Keep protein exactly the same.",color:"#d4a017"});
  }

  return { pushExs, pullExs, coreExs, runPlan, calories, carbsNote, changes: [...changes,...dietChanges] };
}

// ── App state ──────────────────────────────────────────────────────────────
let state = {
  tab: "today",
  activeWeek: 1,
  activeDay: "push",
  entries: loadEntries(),
  nutrition: loadNutrition(),
  selectedDate: getTodayKey(),
  shopping: loadShopping(),
  saveTimer: null,
};

function saveEntries(){
  store.set("entries_v2", state.entries);
}

function saveNutrition(){
  store.set("nutrition_v1", state.nutrition);
}

function saveShopping(){
  store.set("shopping_v1", state.shopping);
}

function getNutritionEntry(dateKey){
  if(!state.nutrition[dateKey]) state.nutrition[dateKey] = defaultNutritionEntry();
  return state.nutrition[dateKey];
}

// ── Render helpers ─────────────────────────────────────────────────────────
const h = (tag, attrs={}, ...children) => {
  const el = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style" && typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null||c===false) return;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return el;
};

function card(accent, ...children){
  const el=h("div",{class:"card card-accent"});
  el.style.setProperty("--accent",accent);
  children.flat().forEach(c=>c&&el.appendChild(typeof c==="string"?document.createTextNode(c):c));
  return el;
}

function exCard(ex, accent){
  const el=h("div",{class:"ex-card"});
  el.style.setProperty("--accent",accent);
  el.appendChild(h("div",{class:"ex-header"},[
    h("div",{class:"ex-name"},ex.name),
    h("div",{class:"ex-sets"},`${ex.sets} sets × ${ex.reps}`),
    h("div",{class:"ex-rest"},`Rest: ${ex.rest}`),
    h("div",{class:"ex-note"},ex.note),
    h("div",{class:"ex-prog"},`↗ ${ex.prog}`),
  ]));
  return el;
}

function sectionLabel(text){
  return h("div",{class:"section-label"},text);
}

function inputField(label, hint, inputEl){
  const lbl=h("div",{class:"input-label"},[label, hint?h("span",{style:{color:"#444",fontSize:"10px"}},hint):null]);
  const wrap=h("div",{class:"field"},[lbl,inputEl]);
  return wrap;
}

// ── Chart (canvas-based, no external lib needed) ──────────────────────────
function drawWeightChart(canvas, entries){
  if(!canvas) return;
  const dpr=window.devicePixelRatio||1;
  var parent=canvas.parentElement; var W=(parent&&parent.offsetWidth>50)?parent.offsetWidth:Math.min(window.innerWidth-40,440);
  const H=200;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+"px"; canvas.style.height=H+"px";
  const ctx=canvas.getContext("2d");
  if(!ctx) return;
  ctx.scale(dpr,dpr);
  const pad={top:10,right:24,bottom:30,left:34};
  const cw=W-pad.left-pad.right, ch=H-pad.top-pad.bottom;
  const minY=73.5, maxY=84;
  const toX=i=>pad.left+(i/(WEEKS.length-1))*cw;
  const toY=v=>pad.top+ch-(v-minY)/(maxY-minY)*ch;
  ctx.strokeStyle="#1e1e1e"; ctx.lineWidth=1;
  [75,77,79,81,83].forEach(y=>{
    ctx.beginPath(); ctx.moveTo(pad.left,toY(y)); ctx.lineTo(pad.left+cw,toY(y)); ctx.stroke();
  });
  ctx.strokeStyle="#1ab873"; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
  ctx.beginPath();
  WEEKS.forEach((w,i)=>i===0?ctx.moveTo(toX(i),toY(START_WEIGHT)):ctx.lineTo(toX(i),toY(w.target)));
  ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle="rgba(26,184,115,0.06)";
  ctx.beginPath(); ctx.moveTo(toX(0),toY(START_WEIGHT));
  WEEKS.forEach((w,i)=>ctx.lineTo(toX(i),toY(w.target)));
  ctx.lineTo(toX(WEEKS.length-1),H); ctx.lineTo(toX(0),H); ctx.closePath(); ctx.fill();
  const actualPts=WEEKS.map((w,i)=>({x:toX(i),y:entries[w.week]?.weight?toY(parseFloat(entries[w.week].weight)):null})).filter(p=>p.y!==null);
  if(actualPts.length>0){
    ctx.fillStyle="rgba(232,83,26,0.12)";
    ctx.beginPath(); ctx.moveTo(actualPts[0].x,actualPts[0].y);
    actualPts.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(actualPts[actualPts.length-1].x,H); ctx.lineTo(actualPts[0].x,H); ctx.closePath(); ctx.fill();
    ctx.strokeStyle="#e8531a"; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(actualPts[0].x,actualPts[0].y);
    actualPts.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.stroke();
    actualPts.forEach(p=>{ ctx.fillStyle="#e8531a"; ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill(); });
  }
  ctx.fillStyle="#555"; ctx.font="9px DM Mono,monospace"; ctx.textAlign="center";
  WEEKS.forEach((w,i)=>ctx.fillText("W"+w.week,toX(i),H-4));
  ctx.textAlign="right";
  [75,77,79,81,83].forEach(y=>ctx.fillText(y,pad.left-4,toY(y)+3));
  ctx.strokeStyle="#1ab87355"; ctx.lineWidth=1; ctx.setLineDash([2,2]);
  ctx.beginPath(); ctx.moveTo(pad.left,toY(76)); ctx.lineTo(pad.left+cw,toY(76)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle="#1ab873"; ctx.font="8px DM Mono,monospace"; ctx.textAlign="left";
  ctx.fillText("76kg",pad.left+cw+2,toY(76)+3);
}

function buildPaceChart(paceData){
  const paceCanvas=h("canvas",{style:{display:"block",width:"100%",height:"140px"}});
  const paceWrap=h("div",{class:"chart-wrap"});
  paceWrap.appendChild(paceCanvas);
  paceWrap._drawFn = function(){
    if(paceData.length < 2) return;
    const dpr=window.devicePixelRatio||1;
    var pp=paceCanvas.parentElement; var W=(pp&&pp.offsetWidth>50)?pp.offsetWidth:Math.min(window.innerWidth-40,440);
    const H=140;
    paceCanvas.width=W*dpr; paceCanvas.height=H*dpr;
    paceCanvas.style.width=W+"px"; paceCanvas.style.height=H+"px";
    const ctx=paceCanvas.getContext("2d");
    if(!ctx) return;
    ctx.scale(dpr,dpr);
    const pad={top:8,right:20,bottom:24,left:36};
    const cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
    const paces=paceData.map(function(d){return d.pace;});
    const minP=Math.min.apply(null,paces)-0.3;
    const maxP=Math.max.apply(null,paces)+0.3;
    const safeRange=Math.max(0.5,maxP-minP);
    const toX=function(i){return pad.left+(paceData[i].week-1)/(WEEKS.length-1)*cw;};
    const toY=function(v){return pad.top+ch-(v-minP)/safeRange*ch;};
    ctx.strokeStyle="#1e1e1e"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.left,pad.top); ctx.lineTo(pad.left,pad.top+ch); ctx.lineTo(pad.left+cw,pad.top+ch); ctx.stroke();
    ctx.strokeStyle="#d4a017"; ctx.lineWidth=2;
    ctx.beginPath();
    paceData.forEach(function(d,i){i===0?ctx.moveTo(toX(i),toY(d.pace)):ctx.lineTo(toX(i),toY(d.pace));});
    ctx.stroke();
    paceData.forEach(function(d,i){
      ctx.fillStyle="#d4a017"; ctx.beginPath(); ctx.arc(toX(i),toY(d.pace),3.5,0,Math.PI*2); ctx.fill();
    });
    ctx.fillStyle="#555"; ctx.font="9px DM Mono,monospace"; ctx.textAlign="center";
    paceData.forEach(function(d,i){ctx.fillText("W"+d.week,toX(i),H-4);});
    ctx.textAlign="right";
    paceData.forEach(function(d){ctx.fillText(d.pace.toFixed(1),pad.left-4,toY(d.pace)+3);});
  };
  return paceWrap;
}

  if(paceData.length>1){
    el.appendChild(h("div",{style:{marginTop:"14px"}}));
    el.appendChild(sectionLabel("Run pace trend (min/km — lower is faster)"));
    el.appendChild(buildPaceChart(paceData));
  }

  // Strength table
  el.appendChild(h("div",{style:{marginTop:"14px"}}));
  el.appendChild(sectionLabel("Strength progress"));
  const strRows=[
    ["",         "Baseline","Wk 4 target","Wk 8 target"],
    ["Chin-ups", "4",       "5–6",         "7–8"],
    ["Pull-ups", "0",       "1–2",         "4–5"],
    ["Push-ups", "15",      "18–20",       "22–25"],
    ["Hang",     "20s",     "35s",         "45s+"],
  ];
  const tbl=h("div",{style:{background:"#111",border:"1px solid #1e1e1e",borderRadius:"10px",overflow:"hidden"}});
  strRows.forEach((row,ri)=>{
    const tr=h("div",{style:{display:"grid",gridTemplateColumns:"1.2fr 1fr 1fr 1fr",borderBottom:ri<strRows.length-1?"1px solid #1a1a1a":"none"}});
    row.forEach((cell,ci)=>{
      const isHeader=ri===0||ci===0;
      const isWk8=ci===3&&ri>0;
      tr.appendChild(h("div",{style:{
        padding:"8px 10px",fontSize:isHeader?"10px":"12px",
        fontWeight:isHeader?"700":"600",
        color:isWk8?"#1ab873":isHeader?"#555":"#f0f0f0",
        fontFamily:isHeader?"DM Mono,monospace":"DM Sans,sans-serif",
        textTransform:isHeader?"uppercase":"none",letterSpacing:isHeader?"0.06em":"0",
        background:ri===0?"#0f0f0f":"transparent",
      }},cell));
    });
    tbl.appendChild(tr);
  });
  el.appendChild(tbl);

  return el;
}

function renderNutrition(){
  const el=h("div",{style:{padding:"0 14px"}});
  const entry=getNutritionEntry(state.selectedDate);
  const waterPct=Math.max(0,Math.min(100,Math.round(((entry.waterCups||0)/DEFAULT_WATER_GOAL)*100)));

  el.appendChild(h("div",{style:{padding:"16px 0 12px"}},[
    h("div",{style:{fontFamily:"DM Mono,monospace",fontSize:"9px",color:"#4ba3ff",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"4px"}},"Daily Nutrition"),
    h("div",{style:{fontSize:"22px",fontWeight:"800",lineHeight:"1.1"}},"Food"),
    h("div",{style:{fontSize:"22px",fontWeight:"800",color:"#4ba3ff",lineHeight:"1.1",marginBottom:"10px"}},"& Water"),
  ]));

  const dateInput=h("input",{class:"input",type:"date",value:state.selectedDate});
  dateInput.addEventListener("input",ev=>{
    state.selectedDate=ev.target.value||getTodayKey();
    render();
  });
  el.appendChild(inputField("Day","saved locally",dateInput));

  const trackers=h("div",{class:"tracker-grid"});
  [
    {value:entry.calories||"0",label:"Calories",sub:"Full-day intake total.",color:"#e8531a"},
    {value:`${entry.waterCups||0}/${DEFAULT_WATER_GOAL}`,label:"Water cups",sub:`${waterPct}% of goal`,color:"#4ba3ff"},
  ].forEach(item=>{
    trackers.appendChild(h("div",{class:"tracker-card"},[
      h("div",{class:"tracker-value",style:{color:item.color}},item.value),
      h("div",{class:"stat-label",style:{marginTop:"8px"}},item.label),
      h("div",{class:"tracker-sub"},item.sub),
    ]));
  });
  el.appendChild(trackers);

  el.appendChild(h("div",{style:{marginBottom:"12px"}},[
    h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"5px"}},[
      h("span",{style:{fontSize:"11px",color:"#555"}},`Water goal: ${DEFAULT_WATER_GOAL} cups`),
      h("span",{style:{fontSize:"11px",color:"#4ba3ff"}},`${waterPct}% complete`),
    ]),
    h("div",{class:"progress-track"},[
      h("div",{class:"progress-fill",style:{width:`${waterPct}%`,background:"linear-gradient(90deg,#4ba3ff,#1ab873)"}}),
    ]),
  ]));

  const waterControls=h("div",{style:{display:"flex",gap:"8px",marginBottom:"14px"}});
  waterControls.appendChild(h("button",{class:"btn-ghost",onClick:()=>{
    entry.waterCups=Math.max(0,(parseInt(entry.waterCups,10)||0)-1);
    saveNutrition();
    render();
  }},"-1 cup"));
  waterControls.appendChild(h("button",{class:"btn-ghost",onClick:()=>{
    entry.waterCups=(parseInt(entry.waterCups,10)||0)+1;
    saveNutrition();
    render();
  }},"+1 cup"));
  el.appendChild(waterControls);

  [
    {key:"calories",label:"Calories",hint:"kcal",placeholder:"e.g. 1780"},
    {key:"protein",label:"Protein",hint:"g",placeholder:"e.g. 145"},
    {key:"carbs",label:"Carbs",hint:"g",placeholder:"e.g. 160"},
    {key:"fat",label:"Fat",hint:"g",placeholder:"e.g. 58"},
    {key:"waterMl",label:"Extra water",hint:"ml",placeholder:"e.g. 750"},
  ].forEach(f=>{
    const inp=h("input",{class:"input",type:"number",placeholder:f.placeholder,value:entry[f.key]||""});
    inp.addEventListener("input",ev=>{
      entry[f.key]=ev.target.value;
      saveNutrition();
    });
    el.appendChild(inputField(f.label,f.hint,inp));
  });

  el.appendChild(sectionLabel("Meals"));
  [
    {key:"breakfast",label:"Breakfast",color:"#e8531a"},
    {key:"lunch",label:"Lunch",color:"#1ab873"},
    {key:"dinner",label:"Dinner",color:"#d4a017"},
    {key:"snacks",label:"Snacks",color:"#4ba3ff"},
  ].forEach(meal=>{
    const ta=h("textarea",{class:"input",rows:"2",placeholder:`Log ${meal.label.toLowerCase()}...`,style:{resize:"none",lineHeight:"1.5"}});
    ta.value=entry[meal.key]||"";
    ta.addEventListener("input",ev=>{
      entry[meal.key]=ev.target.value;
      saveNutrition();
    });
    el.appendChild(h("div",{class:"meal-card",style:{borderLeft:`3px solid ${meal.color}`}},[
      h("div",{style:{fontSize:"13px",fontWeight:"700",color:meal.color,marginBottom:"8px"}},meal.label),
      ta,
    ]));
  });

  const notes=h("textarea",{class:"input",rows:"3",placeholder:"Energy, hunger, cravings, digestion, anything worth noting...",style:{resize:"none",lineHeight:"1.5"}});
  notes.value=entry.notes||"";
  notes.addEventListener("input",ev=>{
    entry.notes=ev.target.value;
    saveNutrition();
  });
  el.appendChild(inputField("Notes",null,notes));

  return el;
}

function renderShopping(){
  const el=h("div",{style:{padding:"0 14px"}});
  const doneCount=state.shopping.filter(item=>item.done).length;

  el.appendChild(h("div",{style:{padding:"16px 0 12px"}},[
    h("div",{style:{fontFamily:"DM Mono,monospace",fontSize:"9px",color:"#d4a017",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"4px"}},"Bottom Tab"),
    h("div",{style:{fontSize:"22px",fontWeight:"800",lineHeight:"1.1"}},"Shopping"),
    h("div",{style:{fontSize:"22px",fontWeight:"800",color:"#d4a017",lineHeight:"1.1",marginBottom:"10px"}},"List"),
  ]));

  const addRow=h("div",{class:"list-row",style:{marginBottom:"12px"}});
  const input=h("input",{class:"input",placeholder:"Add grocery item",style:{flex:"1"}});
  const addItem=function(){
    const text=(input.value||"").trim();
    if(!text) return;
    state.shopping.unshift({id:`shop-${Date.now()}`,text:text,done:false});
    input.value="";
    saveShopping();
    render();
  };
  const addBtn=h("button",{class:"btn-primary",style:{width:"auto",padding:"12px 16px"},onClick:addItem},"Add");
  input.addEventListener("keydown",ev=>{
    if(ev.key==="Enter"){
      ev.preventDefault();
      addItem();
    }
  });
  addRow.appendChild(input);
  addRow.appendChild(addBtn);
  el.appendChild(addRow);

  const controls=h("div",{style:{display:"flex",gap:"8px",marginBottom:"14px"}});
  controls.appendChild(h("button",{class:"btn-ghost",onClick:()=>{
    state.shopping=state.shopping.filter(item=>!item.done);
    saveShopping();
    render();
  }},"Clear checked"));
  controls.appendChild(h("button",{class:"btn-ghost",onClick:()=>{
    state.shopping=defaultShoppingItems();
    saveShopping();
    render();
  }},"Reset staples"));
  el.appendChild(controls);

  el.appendChild(card("#d4a017",[
    h("div",{style:{fontSize:"13px",fontWeight:"700",color:"#d4a017",marginBottom:"3px"}},`${doneCount}/${state.shopping.length} picked up`),
    h("div",{style:{fontSize:"12px",color:"#999",lineHeight:"1.5"}},"Tap an item to mark it done. The list is stored locally on this device."),
  ]));

  state.shopping.forEach(item=>{
    el.appendChild(h("div",{class:`shopping-item${item.done?" done":""}`},[
      h("button",{class:"shopping-check",onClick:()=>{
        item.done=!item.done;
        saveShopping();
        render();
      }},item.done?"✓":""),
      h("button",{style:{flex:"1",textAlign:"left",background:"none",border:"none",color:"inherit"},onClick:()=>{
        item.done=!item.done;
        saveShopping();
        render();
      }},[
        h("div",{class:"shopping-text",style:{fontSize:"14px",fontWeight:"700",color:"#f0f0f0",marginBottom:"2px"}},item.text),
        h("div",{style:{fontSize:"11px",color:"#666"}},item.done?"Marked complete":"Tap to complete"),
      ]),
      h("button",{class:"tiny-btn",onClick:()=>{
        state.shopping=state.shopping.filter(x=>x.id!==item.id);
        saveShopping();
        render();
      }},"Delete"),
    ]));
  });

  return el;
}

// ── Main render ────────────────────────────────────────────────────────────
function redrawCharts(){
  const app=document.getElementById("app");
  if(!app) return;
  var all = app.getElementsByTagName("*");
  for(var i=0;i<all.length;i++){
    if(all[i]._drawFn) all[i]._drawFn();
  }
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  const content=h("div",{});
  if(state.tab==="today") content.appendChild(renderToday());
  else if(state.tab==="log") content.appendChild(renderLog());
  else if(state.tab==="progress") content.appendChild(renderProgress());
  else if(state.tab==="nutrition") content.appendChild(renderNutrition());
  else if(state.tab==="shopping") content.appendChild(renderShopping());
  app.appendChild(content);

  // Draw charts after DOM is painted
  requestAnimationFrame(function(){
    redrawCharts();
  });

  // Nav
  const nav=h("nav",{class:"nav"});
  [
    {id:"today",icon:"🏋️",label:"Plan"},
    {id:"log",icon:"📝",label:"Log"},
    {id:"progress",icon:"📈",label:"Progress"},
    {id:"nutrition",icon:"🥗",label:"Food"},
    {id:"shopping",icon:"🛒",label:"Shop"},
  ].forEach(n=>{
    const btn=h("button",{class:`nav-btn${state.tab===n.id?" active":""}`,
      onClick:()=>{ state.tab=n.id; render(); }},[
      h("span",{class:"nav-icon"},n.icon),
      n.label,
    ]);
    nav.appendChild(btn);
  });
  app.appendChild(nav);
}

render();
window.addEventListener("resize", redrawCharts);

// Register service worker
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
